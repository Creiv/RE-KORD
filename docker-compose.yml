services:
  rekord:
    build: .
    image: rekord:3.5.0
    ports:
      - "${REKORD_PORT:-3001}:3001"
    environment:
      PORT: 3001
      REKORD_LISTEN_HOST: ${REKORD_LISTEN_HOST:-0.0.0.0}
      REKORD_USER_CONFIG_DIR: /config
      REKORD_DOCKER: "1"
      REKORD_DOCKER_MUSIC_DIR: /music
      # Opzionale: fissa la libreria (blocca modifica da Impostazioni)
      # MUSIC_ROOT: /music
      # REKORD_YTDLP_COOKIES: /config/youtube-cookies.txt
    volumes:
      - ${REKORD_MUSIC_HOST:-./docker-data/music}:/music
      - ${REKORD_CONFIG_HOST:-./docker-data/config}:/config
    restart: unless-stopped
